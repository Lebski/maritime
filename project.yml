name: maritime
options:
  bundleIdPrefix: com.example
  developmentLanguage: en

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.example.maritime
    PRODUCT_NAME: maritime
    SWIFT_VERSION: 5.0
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    SUPPORTED_PLATFORMS: macosx
    ALWAYS_SEARCH_USER_PATHS: NO
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    MACOSX_DEPLOYMENT_TARGET: 14.0

targets:
  maritime:
    type: application
    platform: macOS
    deploymentTarget: '14.0'
    sources:
      - path: maritime
    preBuildScripts:
      - name: Inject Git Info into Info.plist (Debug only)
        basedOnDependencyAnalysis: false
        script: |
          PLIST="$SRCROOT/maritime/Info.plist"
          BRANCH=""
          SHA=""
          if [ "$CONFIGURATION" = "Debug" ] && [ -e "$SRCROOT/.git" ]; then
            BRANCH=$(git -C "$SRCROOT" rev-parse --abbrev-ref HEAD 2>/dev/null || true)
            SHA=$(git -C "$SRCROOT" rev-parse --short HEAD 2>/dev/null || true)
          fi
          /usr/libexec/PlistBuddy -c "Set :GitBranch $BRANCH" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Set :GitShortSHA $SHA" "$PLIST" || true
    postBuildScripts:
      - name: Restore Info.plist Git placeholders
        basedOnDependencyAnalysis: false
        script: |
          # The pre-build phase writes branch/SHA into the source Info.plist so
          # they are picked up when Xcode copies the plist into the .app. After
          # the build is signed, restore the source to empty placeholders so the
          # working tree stays clean.
          PLIST="$SRCROOT/maritime/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :GitBranch " "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Set :GitShortSHA " "$PLIST" || true
    entitlements:
      path: maritime/maritime.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
    info:
      path: maritime/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleDisplayName: $(PRODUCT_NAME)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: 6.0
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        GitBranch: ''
        GitShortSHA: ''
        CFBundleIconName: AppIcon
        LSApplicationCategoryType: public.app-category.utilities
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: ''
        NSMainStoryboardFile: ''
        CFBundleDocumentTypes:
          - CFBundleTypeName: MovieBlaze Project
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSTypeIsPackage: true
            LSItemContentTypes:
              - com.movieblaze.project
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.movieblaze.project
            UTTypeDescription: MovieBlaze Project
            UTTypeConformsTo:
              - com.apple.package
              - public.composite-content
            UTTypeTagSpecification:
              public.filename-extension:
                - mblaze

schemes:
  maritime:
    build:
      targets:
        maritime: all
    run:
      config: Debug
    archive:
      config: Release
